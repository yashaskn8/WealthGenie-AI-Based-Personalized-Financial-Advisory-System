<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Genie - Premium Financial Advisor</title>
    <meta name="description" content="Wealth Genie - Your premium Indian financial advisor offering expert investment and wealth management strategies.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Video -->
    <div class="video-container">
        <div class="overlay"></div>
        <video muted playsinline id="bg-video">
            <source src="genie.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Landing Page Overlay -->
    <div id="landing-screen" class="landing-overlay">
        <div class="landing-content">
            <div class="landing-logo">
                <img src="asssets/logo.png" alt="Wealth Genie Logo" class="floating">
            </div>
            <h1 class="landing-title">Wealth Genie</h1>
            <p class="landing-tagline">Architecturing Your Financial Future with AI Intelligence</p>
            <div class="pill-container">
                <span class="pill">AI-Powered</span>
                <span class="pill">Secure</span>
                <span class="pill">Strategic</span>
            </div>
            <button id="enter-btn" class="btn-primary btn-glow">Summon the Genie</button>
        </div>
        <div class="landing-footer">
            <p>&copy; 2026 Wealth Genie. All Rights Reserved.</p>
        </div>
    </div>

    <!-- Main UI -->
    <main class="ui-layer">
        <!-- Login Card -->
        <div class="glass-card login-card" id="login-container">
            <div class="card-header">
                <div class="logo-icon"><img src="asssets/logo.png" alt="Wealth Genie Logo"></div>
                <h1>Wealth Genie</h1>
                <p class="subtitle">Architecturing Your Financial Future with AI Intelligence</p>
            </div>
            
            <!-- Forms Container -->
            <div id="forms-container">
                <!-- Login View -->
                <div class="form-view active" id="login-view">
                    <form id="login-form">
                        <div class="input-group">
                            <label for="login-email">Username</label>
                            <input type="text" id="login-email" placeholder="Enter username (admin)" required autocomplete="username">
                        </div>
                        
                        <div class="input-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="Enter password (admin123)" required>
                        </div>

                        <div class="form-actions">
                            <label class="remember-me">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                    
                    <div class="card-footer">
                        <p>New to Wealth Genie? <a href="#" id="toggle-to-register">Register</a></p>
                    </div>
                </div>

                <!-- Registration View -->
                <div class="form-view hidden" id="register-view">
                    <form id="register-form">
                        <div class="input-group">
                            <label for="reg-name">Full Name</label>
                            <input type="text" id="reg-name" placeholder="Enter your name" required autocomplete="name">
                        </div>

                        <div class="input-group">
                            <label for="reg-email">Gmail ID</label>
                            <input type="email" id="reg-email" placeholder="example@gmail.com" required autocomplete="email">
                        </div>
                        
                        <div class="input-group">
                            <label for="reg-password">Password</label>
                            <input type="password" id="reg-password" placeholder="Create a strong password" required>
                        </div>

                        <div class="input-group">
                            <label for="reg-confirm-password">Confirm Password</label>
                            <input type="password" id="reg-confirm-password" placeholder="Confirm your password" required>
                        </div>

                        <button type="submit" class="btn-primary">Complete Registration</button>
                    </form>
                    
                    <div class="card-footer">
                        <p>Already have an account? <a href="#" id="toggle-to-login">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
