version: '3.9'
services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ml-service:
    build: { context: ./ml-service, dockerfile: Dockerfile }
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes: ["./ml-service/model:/app/model:ro"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  server:
    build: { context: ./server, dockerfile: Dockerfile }
    restart: unless-stopped
    ports: ["5000:5000"]
    depends_on:
      redis: { condition: service_healthy }
      ml-service: { condition: service_healthy }
    env_file: ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - NODE_ENV=production

  reactapp:
    build:
      context: ./reactapp
      dockerfile: Dockerfile
      args: [VITE_API_URL=http://localhost:5000]
    ports: ["5173:80"]
    depends_on: [server]

volumes:
  redis_data:
